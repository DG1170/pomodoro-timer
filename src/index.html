<!DOCTYPE html>
<html lang="zh-CN" data-theme="warm">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>番茄钟</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app" x-data="window.__pomodoroFactory()" x-init="init()" x-cloak>

    <!-- Tab 导航 -->
    <nav class="tabs">
      <button class="tab-btn" :class="{ active: tab === 'timer' }" @click="tab = 'timer'">🍅 计时</button>
      <button class="tab-btn" :class="{ active: tab === 'tasks' }" @click="tab = 'tasks'">📋 任务</button>
      <button class="tab-btn" :class="{ active: tab === 'stats' }" @click="tab = 'stats'">📊 统计</button>
      <button class="tab-btn" :class="{ active: tab === 'settings' }" @click="tab = 'settings'">⚙ 设置</button>
    </nav>

    <!-- ===== 计时器页 ===== -->
    <div x-show="tab === 'timer'" class="clock-area">

      <div class="selected-task" x-show="selectedTask">
        当前任务：<span x-text="selectedTask?.title"></span>
      </div>

      <!-- 环形进度 -->
      <div x-show="settings.clockStyle === 'ring'" class="clock-ring">
        <svg viewBox="0 0 200 200">
          <circle class="bg-circle" cx="100" cy="100" r="90"/>
          <circle class="progress-circle" cx="100" cy="100" r="90"
            stroke-dasharray="565.48"
            :stroke-dashoffset="timerState.total ? 565.48 * (timerState.total - timerState.remaining) / timerState.total : 0"/>
        </svg>
        <div class="time-display">
          <span class="time-text" x-text="formattedTime"></span>
          <span class="phase-text" x-text="phaseLabel"></span>
        </div>
      </div>

      <!-- 大字数字 -->
      <div x-show="settings.clockStyle === 'big'" class="clock-big">
        <div class="time-text" x-text="formattedTime"></div>
        <div class="phase-text" x-text="phaseLabel"></div>
        <div class="progress-bar-mini">
          <div class="progress-bar-mini-fill"
            :style="{ width: timerState.total ? (100 * (timerState.total - timerState.remaining) / timerState.total) + '%' : '0%' }"></div>
        </div>
      </div>

      <!-- 横向进度条 -->
      <div x-show="settings.clockStyle === 'bar'" class="clock-bar">
        <div class="progress-bar">
          <div class="progress-bar-fill"
            :style="{ width: timerState.total ? (100 * (timerState.total - timerState.remaining) / timerState.total) + '%' : '0%' }"></div>
        </div>
        <div class="time-text" x-text="formattedTime"></div>
        <div class="phase-text" x-text="phaseLabel"></div>
      </div>

      <!-- 模拟钟面 -->
      <div x-show="settings.clockStyle === 'analog'" class="clock-analog">
        <div class="hand hand-minute"
          :style="{ transform: 'rotate(' + (timerState.total ? 360 * (timerState.total - timerState.remaining) / timerState.total : 0) + 'deg)' }"></div>
        <div class="center-dot"></div>
        <div class="time-text" x-text="formattedTime"></div>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" @click="toggleTimer()">
          <span x-text="timerState.isRunning ? '暂停' : '开始'"></span>
        </button>
        <button class="btn btn-outline" @click="skipPhase()">跳过</button>
      </div>

      <!-- 番茄进度点 -->
      <div class="tomato-dots">
        <template x-for="(dot, idx) in cycleTomatoes" :key="idx">
          <span :class="{ empty: !dot.filled }">🍅</span>
        </template>
      </div>
    </div>

    <!-- ===== 任务页 ===== -->
    <div x-show="tab === 'tasks'" class="scroll-area">
      <div class="task-input-row">
        <input class="input" type="text" placeholder="添加新任务..."
          x-model="newTaskTitle" @keydown.enter="addTask()">
        <button class="btn btn-primary btn-sm" @click="addTask()">添加</button>
      </div>

      <template x-for="task in sortedTasks" :key="task.id">
        <div class="task-item"
          :class="{ selected: selectedTask?.id === task.id, done: task.done }"
          @click="selectTask(task)">
          <div>
            <div class="task-title" x-text="task.title"></div>
            <div class="task-pomos" x-text="'🍅 ' + (task.completed || 0) + ' / ' + (task.estimated || 0)"></div>
          </div>
          <button class="task-delete" @click.stop="deleteTask(task.id)">✕</button>
        </div>
      </template>

      <p x-show="tasks.length === 0" style="text-align:center;color:var(--text-muted);padding:40px;">
        暂无任务，添加一个吧
      </p>
    </div>

    <!-- ===== 统计页 ===== -->
    <div x-show="tab === 'stats'" class="scroll-area">
      <div class="stat-cards">
        <div class="stat-card">
          <div class="stat-num" x-text="statsData.today"></div>
          <div class="stat-label">今日</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" x-text="statsData.week"></div>
          <div class="stat-label">本周</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" x-text="statsData.total"></div>
          <div class="stat-label">总计</div>
        </div>
      </div>

      <div class="card" x-show="statsData.week > 0">
        <div class="bar-chart">
          <template x-for="(count, day) in statsData.weekBars" :key="day">
            <div class="bar-col">
              <div class="bar-fill" :class="{ empty: count === 0 }"
                :style="{ height: Math.max(4, count / (statsData.maxBar || 1) * 80) + 'px' }"></div>
              <div class="bar-label" x-text="day"></div>
            </div>
          </template>
        </div>
      </div>

      <div class="card" x-show="statsData.taskBreakdown.length > 0">
        <h3 style="font-size:13px;color:var(--text-secondary);margin-bottom:8px;">按任务分布</h3>
        <template x-for="item in statsData.taskBreakdown" :key="item.title">
          <div class="card-row" style="padding:4px 0;">
            <span style="font-size:13px;" x-text="item.title"></span>
            <span style="font-size:13px;color:var(--primary);font-weight:600;" x-text="item.count"></span>
          </div>
        </template>
      </div>

      <p x-show="statsData.total === 0" style="text-align:center;color:var(--text-muted);padding:40px;">
        暂无统计数据，完成番茄后将显示在此
      </p>
    </div>

    <!-- ===== 设置页 ===== -->
    <div x-show="tab === 'settings'" class="scroll-area">
      <div class="setting-group">
        <h3>时长设置（分钟）</h3>
        <div class="setting-row">
          <label>工作时间</label>
          <input type="number" min="1" max="120" x-model.number="settings.work" @change="saveSettingsDebounced()">
        </div>
        <div class="setting-row">
          <label>短休息</label>
          <input type="number" min="1" max="30" x-model.number="settings.shortBreak" @change="saveSettingsDebounced()">
        </div>
        <div class="setting-row">
          <label>长休息</label>
          <input type="number" min="1" max="60" x-model.number="settings.longBreak" @change="saveSettingsDebounced()">
        </div>
        <div class="setting-row">
          <label>长休间隔（番茄数）</label>
          <input type="number" min="1" max="10" x-model.number="settings.longBreakInterval" @change="saveSettingsDebounced()">
        </div>
      </div>

      <div class="setting-group">
        <h3>时钟样式</h3>
        <div class="setting-row">
          <label>显示方式</label>
          <select x-model="settings.clockStyle" @change="saveSettingsDebounced()">
            <option value="ring">环形进度</option>
            <option value="big">大字数字</option>
            <option value="bar">横向进度条</option>
            <option value="analog">模拟钟面</option>
          </select>
        </div>
      </div>

      <div class="setting-group">
        <h3>主题</h3>
        <div class="theme-preview">
          <template x-for="theme in themes" :key="theme.id">
            <div class="theme-dot"
              :class="{ active: settings.theme === theme.id }"
              :style="{ background: theme.color }"
              :title="theme.name"
              @click="settings.theme = theme.id; saveSettingsDebounced()"></div>
          </template>
        </div>
      </div>

      <div class="setting-group">
        <h3>通知</h3>
        <div class="setting-row">
          <label>系统通知</label>
          <input type="checkbox" x-model="settings.notifications.system" @change="saveSettingsDebounced()">
        </div>
        <div class="setting-row">
          <label>提示音</label>
          <input type="checkbox" x-model="settings.notifications.sound" @change="saveSettingsDebounced()">
        </div>
        <div class="setting-row">
          <label>完成后窗口置顶（5秒）</label>
          <input type="checkbox" x-model="settings.notifications.alwaysOnTop" @change="saveSettingsDebounced()">
        </div>
      </div>

      <div class="setting-group">
        <h3>数据管理</h3>
        <div class="btn-group">
          <button class="btn btn-outline btn-sm" @click="exportData()">导出数据</button>
          <button class="btn btn-outline btn-sm"
            style="color:var(--danger);border-color:var(--danger);"
            @click="confirmReset()">重置数据</button>
        </div>
      </div>
    </div>

    <!-- Toast 提示 -->
    <div class="toast" :class="{ show: toastVisible }" x-text="toastMsg"></div>
  </div>

  <script src="timer.js"></script>
  <script src="app.js"></script>
  <script src="alpine.min.js"></script>
</body>
</html>
